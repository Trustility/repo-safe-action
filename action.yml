name: 'Trustility Repo-Safe Proof'
description: 'Emit a Trustility proof for a CI action. Sends only a canonical hash of abstracted metadata — never your source, diffs, or secrets.'
author: 'Trustility'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api-url:
    description: 'Base URL of the Trustility proof rail (for example https://api.trustility.io).'
    required: true
  policy-ref:
    description: 'Policy reference the action is proving against (for example pol:baseline@1).'
    required: true
  proof-type:
    description: 'Proof type: Integrity, Reliability, or Oversight.'
    required: false
    default: 'Integrity'
  agent-id:
    description: 'Optional stable identifier for the emitting workflow or agent.'
    required: false
    default: ''
  agent-key:
    description: 'Optional Ed25519 private key as a JWK JSON string (store it as a repository secret). When set, the proof is signed and the matching public key is attached so anyone can verify it.'
    required: false
    default: ''
  event-data:
    description: 'Optional JSON object of extra abstracted metadata to include. Must not contain raw sensitive fields (amount, recipient, email, content, message, subject, body).'
    required: false
    default: '{}'
  fail-on-error:
    description: 'Fail the step when the proof is not accepted (default true).'
    required: false
    default: 'true'

outputs:
  proof-id:
    description: 'The emitted proof identifier.'
    value: ${{ steps.emit.outputs.proof-id }}
  vc:
    description: 'The VC-JWT credential returned by the proof rail.'
    value: ${{ steps.emit.outputs.vc }}
  event-hash:
    description: 'The canonical hash (sha256:...) that was proven.'
    value: ${{ steps.emit.outputs.event-hash }}
  status:
    description: 'emitted or failed.'
    value: ${{ steps.emit.outputs.status }}

runs:
  using: 'composite'
  steps:
    - id: emit
      shell: bash
      run: node "$GITHUB_ACTION_PATH/src/sign-and-emit.mjs"
      env:
        INPUT_API_URL: ${{ inputs.api-url }}
        INPUT_POLICY_REF: ${{ inputs.policy-ref }}
        INPUT_PROOF_TYPE: ${{ inputs.proof-type }}
        INPUT_AGENT_ID: ${{ inputs.agent-id }}
        INPUT_AGENT_KEY: ${{ inputs.agent-key }}
        INPUT_EVENT_DATA: ${{ inputs.event-data }}
        INPUT_FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
