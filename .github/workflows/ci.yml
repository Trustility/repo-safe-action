name: ci

on:
  push:
  pull_request:

jobs:
  hash-vectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: parity vectors (SDK reproduces the proof rail event hashes)
        run: node --test test/*.test.mjs

  anti-formules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: anti-formules check on public README
        run: bash scripts/anti-formules-check.sh README.md
